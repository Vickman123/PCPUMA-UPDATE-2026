<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Portal de Administradores PC Puma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <div class="card-body p-4 p-md-5">

                <div class="login-logo-container text-center mb-4">
                    <img src="../img/logos/PC Puma.webp" alt="Logotipo PC Puma">
                </div>

                <div class="alert alert-warning d-flex align-items-center small mb-4" role="alert">
                    <i class="bi bi-shield-lock-fill me-2"></i>
                    <div>
                        Uso exclusivo para <strong>Responsables de TI</strong> del Programa PC Puma.
                    </div>
                </div>
                
                <div id="error-message-container"></div>

                <form action="../php/login_process.php" method="POST">
                    <div class="input-group mb-3">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input type="email" class="form-control" name="correo" id="correo" placeholder="Correo Electrónico" required>
                    </div>
                    <div class="input-group mb-4">
                        <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                        <input type="password" class="form-control" name="password" id="password" placeholder="Contraseña" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Iniciar Sesión</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const errorContainer = document.getElementById('error-message-container');
            const params = new URLSearchParams(window.location.search);
            const error = params.get('error');

            if (error) {
                let message = 'Ocurrió un error inesperado.';
                switch (error) {
                    case 'campos_vacios':
                        message = 'Por favor, introduce tu correo y contraseña.';
                        break;
                    case 'usuario_no_encontrado':
                    case 'password_incorrecta':
                        message = 'Credenciales incorrectas. Verifica tu correo y contraseña.';
                        break;
                    case 'acceso_denegado':
                        message = 'No tienes permiso para acceder a esa página. Por favor, inicia sesión.';
                        break;
                }
                errorContainer.innerHTML = `<div class="alert alert-danger small p-2 mb-3">${message}</div>`;
            }
        });
    </script>
</body>
</html>
